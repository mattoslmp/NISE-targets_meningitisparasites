<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="520" viewBox="0 0 1500 520"><defs><style>.t{font-family:Arial,Helvetica,sans-serif;fill:#13243a}.h{font-size:28px;font-weight:700}.s{font-size:18px}.box{stroke:#12395a;stroke-width:4;rx:22}.a{stroke:#008c9e;stroke-width:6;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#008c9e"/></marker></defs><rect width="1500" height="520" fill="#f3f8fc"/><text x="60" y="60" class="t h">AnEnPi-derived target discovery workflow</text><g transform="translate(60,120)"><rect class="box" width="250" height="115" fill="#e9f7ff"/><text x="22" y="42" class="t h" font-size="22">1. Input</text><text x="22" y="76" class="t s">FASTA plus AnEnPi tables</text></g><path class="a" d="M330 178 L390 178"/><g transform="translate(410,120)"><rect class="box" width="250" height="115" fill="#e9fff3"/><text x="22" y="42" class="t h" font-size="22">2. Parse</text><text x="22" y="76" class="t s">EC and cluster matrices</text></g><path class="a" d="M680 178 L740 178"/><g transform="translate(760,120)"><rect class="box" width="250" height="115" fill="#fff2d8"/><text x="22" y="42" class="t h" font-size="22">3. Analog call</text><text x="22" y="76" class="t s">Parasite-specific cluster</text></g><path class="a" d="M1030 178 L1090 178"/><g transform="translate(1110,120)"><rect class="box" width="270" height="115" fill="#f1e6ff"/><text x="22" y="42" class="t h" font-size="22">4. Score</text><text x="22" y="76" class="t s">Recurrence and evidence</text></g><path class="a" d="M1245 250 C1245 310 260 310 260 350"/><g transform="translate(60,360)"><rect class="box" width="250" height="105" fill="#fff6cc"/><text x="22" y="40" class="t h" font-size="22">5. Enrich</text><text x="22" y="72" class="t s">KEGG and inhibitor data</text></g><path class="a" d="M330 412 L390 412"/><g transform="translate(410,360)"><rect class="box" width="280" height="105" fill="#e8ffe6"/><text x="22" y="40" class="t h" font-size="22">6. Fold validation</text><text x="22" y="72" class="t s">SUPERFAMILY or SCOPe</text></g><path class="a" d="M710 412 L770 412"/><g transform="translate(790,360)"><rect class="box" width="300" height="105" fill="#e7f3ff"/><text x="22" y="40" class="t h" font-size="22">7. Outputs</text><text x="22" y="72" class="t s">Article, web page and scripts</text></g><text x="60" y="500" class="t s">Priority score = 2 x positive datasets + evidence bonus + EC-quality bonus + sequence-support bonus.</text></svg>